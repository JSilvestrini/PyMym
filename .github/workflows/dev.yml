name: Build and Test

on:
    push:
        branches: ['dev']

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
    cancel-in-progress: true

jobs:
    dev-test:
        runs-on: windows-latest
        strategy:
            fail-fast: false
            matrix:
                python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        steps:
            - uses: actions/checkout@v4

            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Build and Install PyMym
              run: |
                  python -m pip install --upgrade pip
                  pip install pybind11 pytest scikit-build-core
                  pip install --no-build-isolation -e .

            - name: Run Tests
              run: pytest

    create_pr:
        needs: dev-test
        runs-on: ubuntu-latest
        if: success()
        steps:
            - uses: actions/checkout@v4
            - name: Create Pull Request to Main
              uses: peter-evans/create-pull-request@v6
              with:
                  token: ${{ secrets.PYMYM_REPO_ACCESS_TOKEN }}
                  branch: temp-dev
                  base: main
                  title: 'CI: Auto-PR from Dev (All Matrix Tests Passed)'
                  body: |
                      Automated PR triggered by successful builds and tests on:
                      - Python 3.10
                      - Python 3.11
                      - Python 3.12
                      - Python 3.13
                      - Python 3.14
