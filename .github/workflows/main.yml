name: Production Build and Publish

on:
    push:
        tags:
            - 'v*'

jobs:
    build_wheels:
        name: Build wheels for ${{ matrix.python-version }}
        runs-on: windows-latest
        strategy:
            matrix:
                python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Get Python Ready
              run: |
                  python -m pip install --upgrade pip
                  pip install pybind11 setuptools wheel build pytest

            - name: Build C++ Extension
              run: |
                  $python_path = (Get-Command python).Source
                  cmake -B build -S . "-DPython3_EXECUTABLE=$python_path"
                  cmake --build build

            - name: Build Wheel
              run: python -m build

            - name: Upload Wheel Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: wheels-${{ matrix.python-version }}
                  path: dist/*.whl

    publish:
        name: Publish to PyPI
        needs: build_wheels
        runs-on: ubuntu-latest
        steps:
            - name: Download Wheels
              uses: actions/download-artifact@v4
              with:
                  path: dist
                  pattern: wheels-*
                  merge-multiple: true

            - name: Publish to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  password: ${{ secrets.PYPI_API_TOKEN }}
