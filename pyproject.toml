[build-system]
requires = ["scikit-build-core>=0.5", "pybind11", "setuptools-scm"]
build-backend = "scikit-build-core.build"

[project]
name = "PyMym"
dynamic = ["version"]
description = "A Python library for memory manipulation in Windows"
readme = "README.md"
requires-python = ">=3.10"
authors = [
    {name = "Julian Silvestrini", email = "juliansilvestrini@gmail.com"}
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Operating System :: Microsoft :: Windows",
]
dependencies = [
    "pywin32",
]

[project.urls]
"Documentation" = "https://github.com/JSilvestrini/PyMym/blob/main/README.md"
"Source" = "https://github.com/JSilvestrini/PyMym"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools_scm]
write_to = "src/PyMym/_version.py"

[tool.scikit-build]
cmake.version = ">=3.18"
ninja.make = true
wheel.py-api = "cp310"
sdist.include = ["src/PyMym/*"]
logging.level = "INFO"