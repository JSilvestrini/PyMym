[build-system]
requires = ["setuptools>=61.0", "wheel", "pybind11"]
build-backend = "setuptools.build_meta"

[project]
name = "PyMym"
version = "1.0.2"
description = "A Python library for memory manipulation in Windows"
readme = "README.md"
requires-python = ">=3.10"
author = [
    {name = "Julian Silvestrini", email = "juliansilvestrini@gmail.com"}
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Operating System :: Microsoft :: Windows",
]
dependencies = [
    "pywin32",
]

[project.urls]
"Documentation" = "https://github.com/JSilvestrini/PyMym/blob/main/README.md"
"Source" = "https://github.com/JSilvestrini/PyMym"

[tool.setuptools]
package-dir = {"" = "src"}
zip-safe = false

[tool.setuptools.packages.find]
where = ["src"]
include = ["PyMym*"]

[tool.setuptools.package-data]
"PyMym" = ["backend/*.pyd", "*.pyi"]

[tool.distutils.bdist_wheel]
universal = false